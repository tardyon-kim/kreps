name: kreps-work-os

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16}
    environment:
      POSTGRES_DB: kreps
      POSTGRES_USER: kreps
      POSTGRES_PASSWORD: kreps_dev_password
    ports:
      - "5432:5432"
    volumes:
      - kreps_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kreps -d kreps"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  kreps_postgres:
